name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # Build the image
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t myapp:test .
  # Test the image
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Run tests"
  test2:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "test-2"
  # Push image
  push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Push image to docker registry"
